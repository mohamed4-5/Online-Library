<form id="signupForm" onsubmit="event.preventDefault(); signup();">
                <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required minlength="5">
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="8">
            </div>
            <div>
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirm_password" placeholder="Re-enter your password" required minlength="8">
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div>
                <input type="checkbox" id="admin" name="is_admin" value="true">
                <label for="admin">Admin</label>
                <div id="message"></div>
            </div>
            <div>
                <input type="submit" value="Sign Up">
            </div>
        </form>
